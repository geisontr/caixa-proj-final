name: CI/CD MovieFlix Analytics

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Login no Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build da imagem Docker
      - name: Build Docker image
        run: |
          docker build -t dhgtr/caixa_proj_final .

      # 4. Teste simples: subir container e verificar porta
      - name: Run container for testing
        run: |
          docker run -d -p 8000:8000 --name caixa-test dhgtr/caixa_proj_final
          sleep 5
          curl --fail http://localhost:8000 || (echo "App não respondeu!" && exit 1)

      # 5. Tag da imagem para o Docker Hub
      - name: Tag image
        run: |
          docker tag caixa_proj_final dhgtr/caixa_proj_final:proj_final

      # 6. Push da imagem para o Docker Hub
      - name: Push image to DockerHub
        run: |
          docker push dhgtr/caixa_proj_final:proj_final
